# Evaluation Configuration
# Set environment variables before running:
#   export OPENAI_URL=https://api.openai.com/v1/chat/completions
#   export OPENAI_KEY=your_openai_api_key
#   export GEMINI_API_KEY=your_gemini_api_key

global_config:
  output_root: ./outputs
  use_gpt: false      # Set true to enable GPT scoring
  use_gemini: true    # Set true to enable Gemini scoring
  parallel_workers: 16
  
  # API Configuration (Optional, overrides environment variables)
  api_config:
    openai:
      url: ""  # e.g., "https://api.openai.com/v1/chat/completions"
      key: ""  # your openai api key
    gemini:
      api_key: ""  # your gemini api key
      model_name: "gemini-3.0-flash-preview"

common_tasks:
  all_tasks: &all_tasks
    customization: ["1-3", "4-5", "6-7", ">=8"]
    illustration: ["1-3", "4-5", "6-7", ">=8"]
    spatial: ["1-3", "4-5", "6-7", ">=8"]
    temporal: ["1-3", "4-5", "6-7", ">=8"]

  cus_tasks: &cus_tasks
    customization: ["1-3", "4-5", "6-7", ">=8"]

  cus_tasks_4_5: &cus_tasks_4_5
    customization: ["4-5"]

evaluations:
  bagel:
    bagel_macro:
      tasks: *cus_tasks_4_5
  omnigen:
    omnigen2_macro:
      tasks: *cus_tasks_4_5
  qwen:
    qwen_macro:
      tasks: *cus_tasks_4_5
