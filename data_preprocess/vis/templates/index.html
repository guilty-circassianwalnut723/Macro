<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Visualization - Multi-Reference Data</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header title -->
        <header class="header">
            <h1>Data Visualization - Multi-Reference Data</h1>
        </header>

        <!-- Filter area -->
        <div class="filters">
            <div class="filter-group">
                <label for="task-select">Task Category:</label>
                <select id="task-select">
                    <option value="">Please select...</option>
                </select>
            </div>

            <div class="filter-group" id="spatial-sub-type-group" style="display: none;">
                <label for="sub-type-select">Spatial Subtype:</label>
                <select id="sub-type-select">
                    <option value="">Please select...</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="split-type-select">Train/Eval:</label>
                <select id="split-type-select">
                    <option value="">Please select...</option>
                    <option value="train">Train</option>
                    <option value="eval">Eval</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="image-count-select">Image Num Category:</label>
                <select id="image-count-select">
                    <option value="">Please select...</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filter-select">Filter Type:</label>
                <select id="filter-select">
                    <option value="all">All</option>
                    <option value="pass">Pass</option>
                    <option value="fail">Fail</option>
                </select>
            </div>
        </div>

        <!-- Current selection display -->
        <div class="current-selection">
            <div class="selection-item">
                <span class="label">Current Task:</span>
                <span id="current-task" class="value">-</span>
            </div>
            <div class="selection-item">
                <span class="label">Current Subtype:</span>
                <span id="current-sub-type" class="value">-</span>
            </div>
            <div class="selection-item">
                <span class="label">Current Split:</span>
                <span id="current-split-type" class="value">-</span>
            </div>
            <div class="selection-item">
                <span class="label">Current Image Num:</span>
                <span id="current-image-count" class="value">-</span>
            </div>
            <div class="selection-item">
                <span class="label">Total Samples:</span>
                <span id="total-samples" class="value">0</span>
            </div>
            <div class="selection-item">
                <span class="label">Filter Type:</span>
                <span id="current-filter" class="value">All</span>
            </div>
        </div>

        <!-- Loading indicator -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <span>Loading...</span>
        </div>

        <!-- Error message -->
        <div id="error-message" class="error-message" style="display: none;"></div>

        <!-- Sample display area -->
        <div id="samples-container" class="samples-container"></div>

        <!-- Floating button group -->
        <div class="floating-buttons">
            <div class="floating-pagination">
                <button id="prev-page" class="page-btn" disabled>Prev</button>
                <span id="page-info" class="page-info">Page 0 / 0</span>
                <button id="next-page" class="page-btn" disabled>Next</button>
            </div>
            <button id="back-to-top" class="back-to-top-btn" title="Back to top">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 15l-6-6-6 6"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
