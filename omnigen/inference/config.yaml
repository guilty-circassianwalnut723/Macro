# OmniGen2 Inference Configuration

global_config:
  model_path: ./ckpts/Macro-OmniGen2
  output_root: ./outputs/omnigen
  data_root: ./data/filter  # Set OMNIGEN_DATA_ROOT env var or modify here
  num_gpus: 8
  inference_params:
    scheduler: euler
    num_inference_step: 50
    seed: 42
    height: 768
    width: 768
    # Dynamic resolution: max pixels for each input image based on image count
    # [1img, 2img, 3img, 4img, 5img, 6img, 7img, 8img, 9img, 10+img]
    max_input_image_pixels: [1048576, 1048576, 589824, 589824, 589824, 262144, 262144, 262144, 262144, 262144]
    dtype: bf16
    text_guidance_scale: 5.0
    image_guidance_scale: 2.0
    cfg_range_start: 0.0
    cfg_range_end: 1.0
    num_images_per_prompt: 1
    disable_align_res: true
    enable_model_cpu_offload: false
    enable_sequential_cpu_offload: false
    enable_group_offload: false

common_tasks:
  all_tasks: &all_tasks
    customization: ["1-3", "4-5", "6-7", ">=8"]
    illustration: ["1-3", "4-5", "6-7", ">=8"]
    spatial: ["1-3", "4-5", "6-7", ">=8"]
    temporal: ["1-3", "4-5", "6-7", ">=8"]

  cus_tasks: &cus_tasks
    customization: ["1-3", "4-5", "6-7", ">=8"]

checkpoints:
  omnigen2_macro:
    model_path: ./ckpts/Macro-OmniGen2  # Set OMNIGEN_MODEL_PATH env var or modify here
    transformer_path: ./ckpts/Macro-OmniGen2/transformer  # Optional: path to fine-tuned transformer
    tasks: *cus_tasks
    inference_params:
      max_ref_images: 10
      max_ref_images_strict: true

  omnigen2_official:
    model_path: ./ckpts/OmniGen2  # Set OMNIGEN_MODEL_PATH env var or modify here
    transformer_path: null # Optional: path to fine-tuned transformer
    tasks: *cus_tasks
    inference_params:
      max_ref_images: 10
      max_ref_images_strict: false # to avoid wrongly extending image embed
