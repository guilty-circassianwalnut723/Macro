# Qwen-Image-Edit Inference Configuration

global_config:
  output_root: ./outputs/qwen
  data_root: ./data/filter  # Set QWEN_DATA_ROOT env var or modify here
  num_workers: 8  # number of parallel model instances (one per GPU in round-robin)
  inference_hyper:
    seed: 42
    num_inference_steps: 50
    height: 768
    width: 768
  # Dynamic resolution: max pixels for each input image based on image count
  # [1img, 2img, 3img, 4img, 5img, 6img, 7img, 8img, 9img, 10+img]
  default_max_input_pixels: [1048576, 1048576, 589824, 589824, 589824, 262144, 262144, 262144, 262144, 262144]
  # Default model base path (overridable per checkpoint)
  model_base_path: ./ckpts

common_tasks:
  all_tasks: &all_tasks
    customization: ["1-3", "4-5", "6-7", ">=8"]
    illustration: ["1-3", "4-5", "6-7", ">=8"]
    spatial: ["1-3", "4-5", "6-7", ">=8"]
    temporal: ["1-3", "4-5", "6-7", ">=8"]

  cus_tasks: &cus_tasks
    customization: ["1-3", "4-5", "6-7", ">=8"]

checkpoints:
  qwen_macro:
    model_id: Qwen-Image-Edit-2511
    # Optional: path to fine-tuned transformer weights (full fine-tune)
    transformer_path: Macro-Qwen-Image-Edit/transformer/diffusion_pytorch_model.safetensors
    tasks: *cus_tasks

  qwen_official:
    # model_id: the directory name under model_base_path containing the model files
    model_id: Qwen-Image-Edit-2511
    # Optional: override global model_base_path
    # model_base_path: ./ckpts
    # Optional: path to fine-tuned transformer weights (full fine-tune)
    # transformer_path: ./ckpts/Macro-Qwen-Image-Edit/transformer
    tasks: *cus_tasks
