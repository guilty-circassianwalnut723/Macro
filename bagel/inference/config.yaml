# Bagel Inference Configuration
# Modify the paths to point to your model checkpoints

global_config:
  # Base model path (containing llm_config.json, vit_config.json, ae.safetensors)
  base_model_path: ./ckpts/BAGEL-7B-MoT
  output_root: ./outputs/bagel
  data_root: ./data/filter  # Set BAGEL_DATA_ROOT env var or modify here
  max_mem_per_gpu: "40GiB"
  offload_folder: /tmp/offload
  num_workers: 8
  default_vae_transform: [1024, 512]
  default_vit_transform: [336, 224]
  inference_hyper:
    seed: 42
    cfg_text_scale: 4.0
    cfg_img_scale: 2.0
    cfg_interval: [0.0, 1.0]
    timestep_shift: 3.0
    num_timesteps: 50
    cfg_renorm_min: 0.0
    cfg_renorm_type: text_channel
    image_shapes: "768,768"
  # Dynamic resolution: max pixels for each input image based on image count
  # [1img, 2img, 3img, 4img, 5img, 6img, 7img, 8img, 9img, 10+img]
  default_max_input_pixels: [1048576, 1048576, 589824, 589824, 589824, 262144, 262144, 262144, 262144, 262144]

common_tasks:
  all_tasks: &all_tasks
    customization: ["1-3", "4-5", "6-7", ">=8"]
    illustration: ["1-3", "4-5", "6-7", ">=8"]
    spatial: ["1-3", "4-5", "6-7", ">=8"]
    temporal: ["1-3", "4-5", "6-7", ">=8"]

  cus_tasks: &cus_tasks
    customization: ["1-3", "4-5", "6-7", ">=8"]

checkpoints:
  bagel_macro:
    path: ./ckpts/Macro-Bagel
    is_safetensor: true
    tasks: *cus_tasks
  
  bagel_official:
    # path: directory containing ema.safetensors (set BAGEL_CKPT_PATH env var or modify here)
    path: ./ckpts/BAGEL-7B-MoT
    # base_model_path: override global base_model_path (set BAGEL_BASE_MODEL_PATH env var or modify here)
    base_model_path: ./ckpts/BAGEL-7B-MoT
    # if is trained transformer, set to false to enable convert distributed into single one
    is_safetensor: true
    tasks: *cus_tasks
